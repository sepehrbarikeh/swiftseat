basePath: /api
definitions:
  handlers.ConfirmPaymentRequest:
    properties:
      amount:
        type: integer
      event_id:
        type: integer
      seat_number:
        type: string
    type: object
  handlers.LoginDTO:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handlers.RegisterDTO:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handlers.ReserveSeatRequest:
    properties:
      event_id:
        type: integer
      seat_number:
        description: "\U0001F680 یکپارچه‌سازی با ساختار جدید"
        type: string
    type: object
  handlers.UpdateRoleRequest:
    properties:
      role:
        enum:
        - admin
        - user
        type: string
    required:
    - role
    type: object
host: localhost
info:
  contact: {}
  description: SwiftSeat REST API documentation
  title: SwiftSeat API
  version: "1.0"
paths:
  /:
    get:
      consumes:
      - application/json
      description: Retrieve the home dashboard payload for public display
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get API home data
      tags:
      - Public
  /api/events:
    get:
      consumes:
      - application/json
      description: List events with optional pagination and filtering
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: limit
        type: integer
      - description: Search term
        in: query
        name: search
        type: string
      - description: Location filter
        in: query
        name: location
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List public events
      tags:
      - Events
    post:
      consumes:
      - multipart/form-data
      description: Create a new event in the system
      parameters:
      - description: Event title
        in: formData
        name: title
        required: true
        type: string
      - description: Event description
        in: formData
        name: description
        type: string
      - description: Event location
        in: formData
        name: location
        required: true
        type: string
      - description: Event start time in RFC3339
        in: formData
        name: start_time
        required: true
        type: string
      - description: Number of rows
        in: formData
        name: rows
        required: true
        type: integer
      - description: Number of seats per row
        in: formData
        name: seats_per_row
        required: true
        type: integer
      - description: Event image
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create an event
      tags:
      - Events
  /api/events/{event_id}/seats:
    get:
      consumes:
      - application/json
      description: Get the seat map for an event
      parameters:
      - description: Event ID
        in: path
        name: event_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Get seat map
      tags:
      - Seats
  /api/events/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an existing event by ID
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete an event
      tags:
      - Events
    put:
      consumes:
      - multipart/form-data
      description: Update an existing event's metadata and optional image
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      - description: Event title
        in: formData
        name: title
        type: string
      - description: Event description
        in: formData
        name: description
        type: string
      - description: Event location
        in: formData
        name: location
        type: string
      - description: Event image
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update an event
      tags:
      - Events
  /api/events/all:
    get:
      consumes:
      - application/json
      description: List events with admin-only details and pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: limit
        type: integer
      - description: Search term
        in: query
        name: search
        type: string
      - description: Location filter
        in: query
        name: location
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: List admin events
      tags:
      - Events
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: Login request
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - Authentication
  /api/register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: User registration
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Authentication
  /api/seats/confirm-payment:
    post:
      consumes:
      - application/json
      description: Confirm payment for a reserved seat and issue a ticket
      parameters:
      - description: Payment confirmation
        in: body
        name: payment
        required: true
        schema:
          $ref: '#/definitions/handlers.ConfirmPaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Confirm payment
      tags:
      - Seats
  /api/seats/reserve:
    post:
      consumes:
      - application/json
      description: Temporarily reserve a seat before payment
      parameters:
      - description: Seat reservation
        in: body
        name: reservation
        required: true
        schema:
          $ref: '#/definitions/handlers.ReserveSeatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Reserve a seat
      tags:
      - Seats
  /api/tickets/validate/{ref}:
    get:
      consumes:
      - application/json
      description: Validate a ticket reference and return ticket details
      parameters:
      - description: Ticket reference
        in: path
        name: ref
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Validate a ticket
      tags:
      - Tickets
  /api/user/tickets:
    get:
      consumes:
      - application/json
      description: Retrieve tickets for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get current user's tickets
      tags:
      - Tickets
  /api/users/{id}/role:
    post:
      consumes:
      - application/json
      description: Update the role of a user account
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Role change request
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Change user role
      tags:
      - Users
  /health:
    get:
      consumes:
      - application/json
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - Diagnostics
schemes:
- http
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
